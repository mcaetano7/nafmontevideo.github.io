backend:
  name: git-gateway
  repo: mcaetano7/nafmontevideo.github.io
  branch: main
  
media_folder: img/gallery
public_folder: img/gallery

collections:
  - name: galeria
    label: Galería de fotos
    folder: _data/galeria
    create: true
    fields:
      - { label: Evento, name: titulo, widget: string }
      - { label: Fecha, name: fecha, widget: string }
      - { label: Foto, name: foto, widget: image }
      - { label: Descripción, name: descripcion, widget: string, required: false }
