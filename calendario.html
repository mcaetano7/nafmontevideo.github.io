<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAF Montevideo · Calendario 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ice: #00d4ff;
      --deep: #003d6b;
      --dark: #050f1a;
      --wave: #0077b6;
      --accent: #f0a500;
      --white: #f0f8ff;
      --grey: #7a9bb5;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--dark); color: var(--white); min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 6vw;
      background: rgba(5,15,26,0.95);
      border-bottom: 1px solid rgba(0,212,255,0.12);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; color: var(--ice); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-back { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--grey); text-decoration: none; transition: color .2s; }
    .nav-back:hover { color: var(--ice); }
    .nav-links a { 
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 600; 
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--white); 
      text-decoration: none; transition: color .2s; 
}
    .nav-links a:hover { color: var(--ice); }

    .page-header { padding: 50px 6vw 30px; border-bottom: 1px solid rgba(0,212,255,0.1); }
    .page-tag { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--ice); margin-bottom: .5rem; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 2px; line-height: 1; }
    .page-title span { color: var(--ice); }

    .mes-nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 6vw 12px; max-width: 900px; margin: 0 auto; }
    .mes-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 3px; color: var(--white); text-transform: uppercase; }
    .btn-mes { background: rgba(0,61,107,0.4); border: 1px solid rgba(0,212,255,0.2); color: var(--ice); border-radius: 6px; padding: 8px 16px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; letter-spacing: 1px; transition: background .2s; }
    .btn-mes:hover { background: rgba(0,61,107,0.7); }
    .btn-mes:disabled { opacity: .3; cursor: default; }

    .cal-wrap { padding: 0 6vw 40px; max-width: 900px; margin: 0 auto; }
    .cal-dias-semana { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
    .dia-semana { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--grey); padding: 6px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-celda { min-height: 80px; border-radius: 6px; background: rgba(0,30,60,0.3); border: 1px solid rgba(0,212,255,0.06); padding: 6px; position: relative; }
    .cal-celda.vacia { background: transparent; border-color: transparent; }
    .cal-celda.tiene-evento { background: rgba(0,61,107,0.5); border-color: rgba(0,212,255,0.25); cursor: pointer; transition: background .2s, border-color .2s, transform .15s; }
    .cal-celda.tiene-evento:hover { background: rgba(0,61,107,0.8); border-color: rgba(0,212,255,0.5); transform: translateY(-2px); }
    .cal-celda.hoy { border-color: var(--accent) !important; }
    .num-dia { font-size: .8rem; font-weight: 600; color: var(--grey); margin-bottom: 4px; }
    .cal-celda.tiene-evento .num-dia { color: var(--ice); }
    .cal-celda.hoy .num-dia { color: var(--accent); }
    .evento-chip { font-size: .68rem; line-height: 1.3; color: rgba(240,248,255,0.85); display: -webkit-box; line-clamp: 3; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .multi-dot { display: flex; gap: 3px; margin-top: 4px; flex-wrap: wrap; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ice); flex-shrink: 0; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .overlay.abierto { display: flex; }
    .panel { background: #0a1929; border-top: 2px solid var(--ice); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px; padding: 28px 24px 40px; max-height: 85vh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .panel-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.2rem; gap: 1rem; }
    .panel-fecha { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--ice); margin-bottom: .3rem; }
    .panel-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; line-height: 1.1; color: var(--white); }
    .btn-cerrar { background: rgba(255,255,255,0.1); border: none; color: var(--white); border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .btn-cerrar:hover { background: rgba(255,255,255,0.2); }
    .panel-campos { display: flex; flex-direction: column; gap: .8rem; margin-bottom: 1.5rem; }
    .campo { display: flex; gap: .8rem; align-items: flex-start; }
    .campo-icon { font-size: .9rem; min-width: 20px; margin-top: 2px; }
    .campo-label { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--grey); margin-bottom: 2px; }
    .campo-valor { font-size: .95rem; color: var(--white); line-height: 1.5; }
    .btn-inscripcion { display: block; width: 100%; text-align: center; background: var(--accent); color: var(--dark); border: none; border-radius: 8px; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; text-decoration: none; transition: background .2s; }
    .btn-inscripcion:hover { background: #ffb800; }
    .btn-inscripcion.texto { background: rgba(0,212,255,0.15); color: var(--ice); border: 1px solid rgba(0,212,255,0.3); }
    .panel-lista { display: flex; flex-direction: column; gap: 1.5rem; }
    .panel-evento { border-bottom: 1px solid rgba(0,212,255,0.1); padding-bottom: 1.5rem; }
    .panel-evento:last-child { border-bottom: none; padding-bottom: 0; }

    .sin-fecha { padding: 30px 6vw 50px; max-width: 900px; margin: 0 auto; }
    .sin-fecha-titulo { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: var(--grey); margin-bottom: 1rem; }
    .sin-fecha-lista { display: flex; flex-direction: column; gap: 8px; }
    .sin-fecha-item { background: rgba(0,30,60,0.4); border: 1px solid rgba(0,212,255,0.1); border-radius: 8px; padding: 12px 16px; }
    .sin-fecha-nombre { font-size: .95rem; color: var(--white); font-weight: 500; }
    .sin-fecha-desc { font-size: .8rem; color: var(--grey); margin-top: 3px; }

    @media (max-width: 600px) {
      .cal-celda { min-height: 58px; padding: 4px; }
      .evento-chip { font-size: .6rem; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; -webkit-line-clamp: 2; line-clamp: 2; }
      .num-dia { font-size: .7rem; }
      .panel { padding: 24px 18px 36px; }
    }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 26px; height: 2px; background: var(--white); border-radius: 2px; }
    .nav-links { display: none; }

    @media (min-width: 100px) {
      
      .hamburger { display: flex; }
      .nav-links.open { display: flex; flex-direction: column; position: fixed; top: 60px; left: 0; right: 0; 
        background: rgba(5,15,26,0.97); padding: 2rem; gap: 1.5rem; 
        border-bottom: 1px solid rgba(0,212,255,0.15); 
        list-style: none; }
}
  </style>
  <link rel="icon" href="img\logo.png">
</head>
<body>

  <nav>
     <a href="index.html" class="nav-logo">
  <img src="img/logo.png" alt="NAF MVD" style="height: 36px; margin-right: 8px; vertical-align: middle;">NAF<span> </span>MVD
</a>

<ul class="nav-links" id="navLinks">
  <li><a href="index.html#nosotros">Nosotros</a></li>
  <li><a href="index.html#fotos">Fotos</a></li>
  <li><a href="index.html#contacto">Contacto</a></li>
</ul>

<div style="display:flex; align-items:center; gap:12px;">
  <a href="index.html" class="nav-back">← Volver</a>
  <div class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</div>
  </nav>

  <div class="page-header">
    <div class="page-tag">Actividades</div>
    <h1 class="page-title">Calendario <span>2026</span></h1>
  </div>

  <div class="mes-nav">
    <button class="btn-mes" id="btn-prev" onclick="cambiarMes(-1)">&#8592;</button>
    <div class="mes-titulo" id="mes-titulo"></div>
    <button class="btn-mes" id="btn-next" onclick="cambiarMes(1)">&#8594;</button>
  </div>

  <div class="cal-wrap">
    <div class="cal-dias-semana">
      <div class="dia-semana">Dom</div>
      <div class="dia-semana">Lun</div>
      <div class="dia-semana">Mar</div>
      <div class="dia-semana">Mié</div>
      <div class="dia-semana">Jue</div>
      <div class="dia-semana">Vie</div>
      <div class="dia-semana">Sáb</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="sin-fecha" id="sin-fecha"></div>

  <div class="overlay" id="overlay" onclick="cerrarPanel(event)">
    <div class="panel" id="panel">
      <div id="panel-contenido"></div>
    </div>
  </div>

  <script src="actividades.js"></script>
  <script>
    const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

    function parsearFecha(str) {
      if (!str) return null;
      const p = str.split("/");
      if (p.length !== 3) return null;
      let anio = parseInt(p[2]);
      if (anio < 100) anio += 2000;
      return new Date(anio, parseInt(p[1]) - 1, parseInt(p[0]));
    }

    function buildIndex() {
      const idx = {};
      calendario.forEach(ev => {
        const d = parsearFecha(ev.fecha);
        if (!d) return;
        const key = d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
        if (!idx[key]) idx[key] = [];
        idx[key].push(ev);
      });
      return idx;
    }
    const eventosIdx = buildIndex();

    const hoy = new Date();
    let mesActual = hoy.getMonth();
    let anioActual = hoy.getFullYear();

    function cambiarMes(delta) {
      mesActual += delta;
      if (mesActual < 0) { mesActual = 11; anioActual--; }
      if (mesActual > 11) { mesActual = 0; anioActual++; }
      renderCalendario();
    }

    function renderCalendario() {
      document.getElementById("mes-titulo").textContent = MESES[mesActual] + " " + anioActual;
      const primerDia = new Date(anioActual, mesActual, 1).getDay();
      const diasEnMes = new Date(anioActual, mesActual + 1, 0).getDate();
      const grid = document.getElementById("cal-grid");
      grid.innerHTML = "";

      for (let i = 0; i < primerDia; i++) {
        const v = document.createElement("div");
        v.className = "cal-celda vacia";
        grid.appendChild(v);
      }

      for (let d = 1; d <= diasEnMes; d++) {
        const key = anioActual + "-" + mesActual + "-" + d;
        const eventos = eventosIdx[key] || [];
        const esHoy = hoy.getFullYear() === anioActual && hoy.getMonth() === mesActual && hoy.getDate() === d;

        const celda = document.createElement("div");
        celda.className = "cal-celda" + (eventos.length ? " tiene-evento" : "") + (esHoy ? " hoy" : "");

        const numDiv = document.createElement("div");
        numDiv.className = "num-dia";

        numDiv.textContent = d;
        celda.appendChild(numDiv);

        if (eventos.length === 1) {
          const chip = document.createElement("div");
          chip.className = "evento-chip";
          chip.textContent = eventos[0].nombre;
          celda.appendChild(chip);
        } else if (eventos.length > 1) {
          const chip = document.createElement("div");
          chip.className = "evento-chip";
          chip.textContent = eventos[0].nombre;
          celda.appendChild(chip);
          const dots = document.createElement("div");
          dots.className = "multi-dot";
          eventos.forEach(() => {
            const dot = document.createElement("div");
            dot.className = "dot";
            dots.appendChild(dot);
          });
          celda.appendChild(dots);
        }

        if (eventos.length) celda.onclick = () => abrirPanel(eventos, d);
        grid.appendChild(celda);
      }

      const sinFecha = calendario.filter(ev => !ev.fecha);
      const sfDiv = document.getElementById("sin-fecha");
      sfDiv.innerHTML = sinFecha.length
        ? `<div class="sin-fecha-titulo">Fecha a confirmar</div><div class="sin-fecha-lista">` +
          sinFecha.map(ev => `<div class="sin-fecha-item"><div class="sin-fecha-nombre">${ev.nombre}</div><div class="sin-fecha-desc">${ev.descripcion !== "N/A" ? ev.descripcion : ev.lugar !== "consultar" ? ev.lugar : "Detalles próximamente"}</div></div>`).join("") +
          `</div>`
        : "";
    }

    function formatearFecha(str) {
      const d = parsearFecha(str);
      if (!d) return "";
      return DIAS[d.getDay()] + " " + d.getDate() + " de " + MESES[d.getMonth()] + " " + d.getFullYear();
    }

    function renderEvento(ev) {
      let inscHtml = "";
      if (ev.organizacion === "NAF MVD") {
        const params = `titulo=${encodeURIComponent(ev.nombre)}&fecha=${encodeURIComponent(ev.fecha)}&hora=${encodeURIComponent(ev.hora || "23:59")}`;
        inscHtml = `<a href="lista.html?${params}" class="btn-inscripcion">Anotarse →</a>`;
      } else if (ev.inscripcion && ev.inscripcion.startsWith("http")) {
        inscHtml = `<a href="${ev.inscripcion}" target="_blank" class="btn-inscripcion">Inscribirse →</a>`;
      } else if (ev.inscripcion === "rutas.html") {
        inscHtml = `<a href="rutas.html" class="btn-inscripcion">Ver actividad →</a>`;
      }
      return `
        <div class="panel-fecha">${formatearFecha(ev.fecha)}</div>
        <div class="panel-titulo">${ev.nombre}</div>
        <div class="panel-campos" style="margin-top:1rem">
          ${ev.lugar !== "consultar" ? `<div class="campo"><span class="campo-icon">📍</span><div><div class="campo-label">Lugar</div><div class="campo-valor">${ev.lugar}</div></div></div>` : ""}
          ${ev.distancia !== "consultar" ? `<div class="campo"><div><div class="campo-label">Distancia</div><div class="campo-valor">${ev.distancia}</div></div></div>` : ""}
          ${ev.descripcion && ev.descripcion !== "N/A" ? `<div class="campo"><div><div class="campo-label">Info</div><div class="campo-valor">${ev.descripcion}</div></div></div>` : ""}
          ${ev.hora ? `<div class="campo"><div><div class="campo-label">Hora</div><div class="campo-valor">${ev.hora}h</div></div></div>` : ""}
        </div>
        ${inscHtml}
      `;
    }

    function abrirPanel(eventos, dia) {
      const contenido = document.getElementById("panel-contenido");
      contenido.innerHTML = eventos.length === 1
        ? `<div class="panel-header"><div></div><button class="btn-cerrar" onclick="cerrarPanel()">✕</button></div>${renderEvento(eventos[0])}`
        : `<div class="panel-header"><div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px">${dia} de ${MESES[mesActual]} · ${eventos.length} actividades</div><button class="btn-cerrar" onclick="cerrarPanel()">✕</button></div><div class="panel-lista">${eventos.map(ev => `<div class="panel-evento">${renderEvento(ev)}</div>`).join("")}</div>`;
      document.getElementById("overlay").classList.add("abierto");
      document.body.style.overflow = "hidden";
    }

    function cerrarPanel(e) {
      if (e && e.target !== document.getElementById("overlay")) return;
      document.getElementById("overlay").classList.remove("abierto");
      document.body.style.overflow = "";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") { document.getElementById("overlay").classList.remove("abierto"); document.body.style.overflow = ""; }
    });

    renderCalendario();

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }
    document.querySelectorAll('.nav-links a').forEach(a =>
      a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'))
    )
  </script>
  <footer>
    <div class="footer-logo">NAF<span> </span>MVD</div>
    <div class="footer-copy">© 2026 NAF Montevideo</div>
    <div class="footer-links">
      <a href="#inicio">Inicio</a>
      <a href="index.html#nosotros">Nosotros</a>
      <a href="index.html#fotos">Fotos</a>
      <a href="index.html#contacto">Contacto</a>
    </div>
  </footer>

</body>
</html>
